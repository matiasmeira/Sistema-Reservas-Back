spring.application.name=back-reservas

# ==========================================
# 🔐 JWT Configuration
# ==========================================
security.jwt.secret-key=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposesOnlyChangeThisInProductionEnvironment12345}
security.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# 🖥️ Server Configuration
# ==========================================
server.port=${SERVER_PORT:8080}


# ==========================================
# 📊 Database Configuration (PostgreSQL)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/back_reservas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}


# ==========================================
# 📝 Logging Configuration
# ==========================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.matiasmeira.back_reservas=${LOGGING_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:DEBUG}

# ==========================================
# 💳 Mercado Pago Configuration
# ==========================================
mercado-pago.access-token=${MP_ACCESS_TOKEN:}
mercado-pago.public-key=${MP_PUBLIC_KEY:}
